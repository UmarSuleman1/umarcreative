<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio – Umar Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg-dark:#050d1a; --bg-card:rgba(17,24,39,0.7);
  --text-white:#fff; --text-gray:#94a3b8;
  --accent-cyan:#22d3ee; --accent-purple:#a855f7;
  --gradient-main:linear-gradient(135deg,#a855f7,#22d3ee);
  --glass:rgba(255,255,255,0.04); --glass-border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg-dark);color:var(--text-white);font-family:'Rajdhani',sans-serif;overflow-x:hidden;cursor:none;}
a{text-decoration:none;color:inherit;} ul{list-style:none;}

#cur{position:fixed;width:10px;height:10px;background:#22d3ee;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 15px #22d3ee,0 0 30px rgba(34,211,238,0.4);transition:transform 0.1s;}
#cur-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(34,211,238,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.18s ease;}
#three-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.025) 1px,transparent 1px);background-size:60px 60px;}
.scanline{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,0.08),transparent);z-index:2;pointer-events:none;animation:scan 6s linear infinite;}
@keyframes scan{0%{top:-2px}100%{top:100vh}}

header{position:sticky;top:0;z-index:500;padding:0.8rem 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,13,26,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(34,211,238,0.1);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,0.4),transparent);}
.logo-icon{width:220px;height:65px;overflow:hidden;display:flex;align-items:center;}
.logo-icon img{width:100%;height:100%;object-fit:contain;}
nav ul{display:flex;gap:2rem;}
nav a{font-size:0.85rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-gray);transition:0.3s;position:relative;padding-bottom:4px;}
nav a::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--accent-cyan);transform:scaleX(0);transform-origin:left;transition:0.3s;}
nav a:hover,nav a.active{color:var(--accent-cyan);}
nav a:hover::after,nav a.active::after{transform:scaleX(1);}
.menu-toggle{display:none;font-size:1.4rem;color:#fff;background:none;border:none;cursor:none;width:32px;height:32px;align-items:center;justify-content:center;}

/* HERO */
.hero{position:relative;z-index:10;padding:5rem 5% 3rem;text-align:center;}
.hero-badge{display:inline-block;font-size:0.75rem;letter-spacing:5px;text-transform:uppercase;color:var(--accent-purple);border:1px solid rgba(168,85,247,0.3);padding:6px 20px;margin-bottom:1.5rem;background:rgba(168,85,247,0.05);clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
.hero h1{font-family:'Orbitron',monospace;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin-bottom:1rem;}
.hero h1 span{background:linear-gradient(135deg,#a855f7,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--text-gray);max-width:550px;margin:0 auto;}

/* FILTER TABS */
.filter-wrap{position:relative;z-index:10;display:flex;justify-content:center;gap:0.75rem;flex-wrap:wrap;padding:0 5% 2rem;}
.tab{background:var(--glass);color:var(--text-gray);padding:8px 24px;border:1px solid var(--glass-border);cursor:none;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;font-weight:600;transition:0.3s;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);}
.tab.active,.tab:hover{background:linear-gradient(135deg,rgba(168,85,247,0.3),rgba(34,211,238,0.2));color:#fff;border-color:rgba(168,85,247,0.5);}

/* GRID */
.port-container{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:0 5% 4rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}

.card-3d{position:relative;border-radius:4px;overflow:hidden;cursor:none;border:1px solid rgba(255,255,255,0.06);aspect-ratio:4/5;background:#1e293b;transform-style:preserve-3d;transition:0.4s;}
.card-3d img{width:100%;height:100%;object-fit:cover;display:block;transition:0.4s;}
.card-3d:hover{border-color:rgba(34,211,238,0.4);}
.card-3d:hover img{transform:scale(1.05);}
.card-hover-3d{position:absolute;inset:0;opacity:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:1.2rem;transition:0.3s;}
.card-3d:hover .card-hover-3d{opacity:1;}
.card-hover-3d p{color:#fff;font-weight:700;font-size:0.85rem;letter-spacing:1px;text-align:center;padding:0 10px;}
.play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(168,85,247,0.85);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;pointer-events:none;}

/* CTA */
.cta-section{position:relative;z-index:10;text-align:center;padding:4rem 5%;background:rgba(5,13,26,0.8);border-top:1px solid rgba(34,211,238,0.08);}
.cta-section h2{font-family:'Orbitron',monospace;font-size:1.8rem;margin-bottom:1rem;}
.cta-section p{color:var(--text-gray);margin-bottom:1.5rem;}

.btn-wa{display:inline-block;background:#25D366;color:#fff;padding:14px 32px;font-family:'Rajdhani';font-weight:700;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);transition:0.3s;cursor:none;}
.btn-wa:hover{opacity:0.9;transform:translateY(-3px);}

footer{position:relative;z-index:10;text-align:center;padding:1.5rem;color:var(--text-gray);font-size:0.8rem;letter-spacing:1px;border-top:1px solid rgba(34,211,238,0.08);background:rgba(5,13,26,0.9);}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:10000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);}
.lightbox img{max-width:95%;max-height:92vh;border-radius:8px;box-shadow:0 0 60px rgba(34,211,238,0.2);}
.lightbox video{max-width:95%;max-height:92vh;border-radius:8px;}
.lb-close{position:absolute;top:24px;right:32px;color:#fff;font-size:48px;font-weight:300;cursor:none;line-height:1;font-family:'Orbitron',monospace;transition:0.3s;}
.lb-close:hover{color:var(--accent-cyan);}

@media(max-width:768px){
  nav ul{display:none;position:fixed;top:72px;left:0;right:0;background:rgba(5,13,26,0.98);flex-direction:column;gap:0;padding:0.5rem 0;border-bottom:1px solid #334155;z-index:200;backdrop-filter:blur(20px);}
  nav ul.open{display:flex;}
  nav ul li a{display:block;padding:0.9rem 5%;border-bottom:1px solid #1e293b;}
  nav ul li:last-child a{border-bottom:none;}
  .menu-toggle{display:flex;}
  .logo-icon{width:180px;height:55px;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>
<canvas id="three-bg"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<header>
  <a href="index.html"><div class="logo-icon"><img src="images/logo/logo1.png" alt="Umar Creative"></div></a>
  <nav>
    <ul id="navMobile">
      <li><a href="index.html" onclick="closeNav()">Home</a></li>
      <li><a href="portfolio.html" class="active" onclick="closeNav()">Portfolio</a></li>
      <li><a href="services.html" onclick="closeNav()">Services</a></li>
      <li><a href="contact.html" onclick="closeNav()">Contact Us</a></li>
    </ul>
  </nav>
  <button class="menu-toggle" onclick="toggleNav()">☰</button>
</header>

<section class="hero">
  <div class="hero-badge">Our Work</div>
  <h1>Creative <span>Portfolio</span></h1>
  <p>A curated collection of social media designs, print media, and branding work.</p>
</section>

<div class="filter-wrap">
  <button class="tab active" data-type="all" onclick="filterP(this)">All Work</button>
  <button class="tab" data-type="social" onclick="filterP(this)">Social Media</button>
  <button class="tab" data-type="print" onclick="filterP(this)">Print Media</button>
  <button class="tab" data-type="branding" onclick="filterP(this)">Branding</button>
</div>

<div class="port-container">
  <div class="grid" id="portfolioGrid"></div>
</div>

<section class="cta-section">
  <h2>Like What You See?</h2>
  <p>Let's work together and bring your brand to life.</p>
  <a href="https://wa.me/923201482901" class="btn-wa">📞 Book a Call</a>
</section>

<footer><p>&copy; 2026 Umar Creative. AI Crafted Brands.</p></footer>

<div class="lightbox" id="lb">
  <span class="lb-close" onclick="closeLb()">×</span>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
setInterval(()=>{rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';},16);

// THREE.JS
(function(){
  const canvas=document.getElementById('three-bg');
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100); cam.position.z=6;
  const n=1800,pos=new Float32Array(n*3),col=new Float32Array(n*3);
  for(let i=0;i<n;i++){pos[i*3]=(Math.random()-.5)*22;pos[i*3+1]=(Math.random()-.5)*18;pos[i*3+2]=(Math.random()-.5)*12;const r=Math.random();if(r<0.45){col[i*3]=0;col[i*3+1]=0.83;col[i*3+2]=0.93;}else{col[i*3]=0.66;col[i*3+1]=0.33;col[i*3+2]=0.97;}}
  const pg=new THREE.BufferGeometry();
  pg.setAttribute('position',new THREE.BufferAttribute(pos,3));
  pg.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(pg,new THREE.PointsMaterial({size:0.02,vertexColors:true,transparent:true,opacity:0.6})));
  let mouseX=0,mouseY=0;
  document.addEventListener('mousemove',e=>{mouseX=(e.clientX/innerWidth-.5)*2;mouseY=-(e.clientY/innerHeight-.5)*2;});
  window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  let t=0;(function tick(){requestAnimationFrame(tick);t+=0.003;cam.position.x+=(mouseX*0.3-cam.position.x)*0.04;cam.position.y+=(mouseY*0.2-cam.position.y)*0.04;cam.lookAt(0,0,0);renderer.render(scene,cam);})();
})();

// NAV
function toggleNav(){document.getElementById('navMobile').classList.toggle('open');}
function closeNav(){document.getElementById('navMobile').classList.remove('open');}

// LIGHTBOX
function showLb(src,isVid=false){
  const lb=document.getElementById('lb');
  lb.querySelectorAll('img,video').forEach(e=>e.remove());
  const el=document.createElement(isVid?'video':'img');
  el.src=src; if(isVid){el.controls=true;el.autoplay=true;el.style.cssText='max-width:95%;max-height:92vh;border-radius:8px;';}
  lb.appendChild(el); lb.style.display='flex';
}
function closeLb(){const lb=document.getElementById('lb');lb.style.display='none';lb.querySelectorAll('video').forEach(v=>v.pause());}
document.getElementById('lb').addEventListener('click',e=>{if(e.target===document.getElementById('lb'))closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

// PORTFOLIO DATA
const printItems=Array.from({length:31},(_, i)=>{
  const n=i+1;
  if(n===18) return {category:'print',image:`images/portfolio/print/p${n}.mp4`,title:`Print Design p${n}`,isVideo:true};
  return {category:'print',image:`images/portfolio/print/p${n}.jpg`,title:`Print Design p${n}`,isVideo:false};
});
const items=[
  ...Array.from({length:31},(_,i)=>({category:'social',image:`images/portfolio/social/${i+1}.jpg`,title:`Social Post ${i+1}`,isVideo:false})),
  ...printItems,
  ...Array.from({length:8},(_,i)=>({category:'branding',image:`images/portfolio/branding/${i+1}.jpg`,title:`Branding ${i+1}`,isVideo:false})),
];

function render(list){
  const grid=document.getElementById('portfolioGrid');
  grid.innerHTML='';
  list.forEach(item=>{
    const card=document.createElement('div');
    card.className='card-3d';
    card.onclick=()=>showLb(item.image,item.isVideo);
    if(item.isVideo){
      card.innerHTML=`<video src="${item.image}" muted loop playsinline style="width:100%;height:100%;object-fit:cover;display:block;" onmouseenter="this.play()" onmouseleave="this.pause()"></video><div class="card-hover-3d" style="pointer-events:none;"><p>▶ ${item.title}</p></div><div class="play-icon" style="pointer-events:none;">▶</div>`;
    } else {
      card.innerHTML=`<img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/400x500?text=Not+Found'"><div class="card-hover-3d"><p>${item.title}</p></div>`;
    }
    // 3D tilt
    card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();const x=((e.clientX-r.left)/r.width-.5)*18;const y=-((e.clientY-r.top)/r.height-.5)*18;card.style.transform=`perspective(600px) rotateX(${y}deg) rotateY(${x}deg) scale(1.03)`;});
    card.addEventListener('mouseleave',()=>{card.style.transform='';});
    grid.appendChild(card);
  });
}

function filterP(btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const type=btn.dataset.type;
  render(type==='all'?items:items.filter(i=>i.category===type));
}

render(items);
</script>
</body>
</html>
